apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboards
  namespace: dashboards
  labels:
    app.kubernetes.io/name: dashboards
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboards
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboards
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: app
          image: ghcr.io/ventureforgre/dashboards:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-temp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-temp
          emptyDir: {}

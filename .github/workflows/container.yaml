name: Build and Push Container

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "package*.json"
      - "Dockerfile"
      - "next.config.mjs"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/container.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: [self-hosted, Linux, X64, homelab]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          docker build -t ghcr.io/ventureforgre/dashboards:main -t ghcr.io/ventureforgre/dashboards:${{ github.sha }} .
          docker push ghcr.io/ventureforgre/dashboards:main
          docker push ghcr.io/ventureforgre/dashboards:${{ github.sha }}

      - name: Logout
        if: always()
        run: docker logout ghcr.io

name: One-Time Cluster Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: [self-hosted, Linux, X64, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Install GHCR pull secret
        run: |
          # The dashboards-git-auth secret was already installed by a previous run.
          # Now we just need the GHCR pull secret.
          # Wait for the namespace to exist (Flux creates it from namespace.yaml)
          echo "Waiting for dashboards namespace to be created by Flux..."
          for i in $(seq 1 30); do
            if kubectl get ns dashboards 2>/dev/null; then
              echo "Namespace exists!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          
          # Create GHCR pull secret for the namespace
          kubectl -n dashboards create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=1solomonwakhungu \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "GHCR pull secret installed"

      - name: Verify
        run: |
          kubectl -n flux-system get secret dashboards-git-auth || true
          kubectl -n flux-system get gitrepository dashboards || true
          kubectl -n flux-system get kustomization dashboards || true
          kubectl -n dashboards get secret ghcr-pull || true
          kubectl get ns dashboards || true
          kubectl -n dashboards get pods || true
          kubectl -n dashboards get ingressroute || true

name: One-Time Cluster Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: [self-hosted, Linux, X64, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Install Flux deploy key secret
        run: |
          # Generate the SSH key pair
          ssh-keygen -t ed25519 -f /tmp/dashboards-flux-key -N ""
          
          # Add public key as deploy key to the repo
          gh repo deploy-key add /tmp/dashboards-flux-key.pub --repo VentureForgre/dashboards --title "Flux read-only" || true
          
          # Generate known_hosts
          ssh-keyscan -t ed25519 github.com > /tmp/dashboards-known-hosts 2>/dev/null
          
          # Create the secret in the cluster
          kubectl -n flux-system create secret generic dashboards-git-auth \
            --from-file=identity=/tmp/dashboards-flux-key \
            --from-file=identity.pub=/tmp/dashboards-flux-key.pub \
            --from-file=known_hosts=/tmp/dashboards-known-hosts \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # Create GHCR pull secret for the namespace
          kubectl -n dashboards create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=1solomonwakhungu \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # Cleanup
          rm -f /tmp/dashboards-flux-key /tmp/dashboards-flux-key.pub /tmp/dashboards-known-hosts
          
          echo "Cluster setup complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify
        run: |
          kubectl -n flux-system get secret dashboards-git-auth
          kubectl -n flux-system get gitrepository dashboards
          kubectl -n flux-system get kustomization dashboards

name: Verify Deployment

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: [self-hosted, Linux, X64, homelab]
    steps:
      - name: Check deployment status
        run: |
          echo "=== GitRepository ==="
          kubectl -n flux-system get gitrepository dashboards
          echo ""
          echo "=== Kustomization ==="
          kubectl -n flux-system get kustomization dashboards
          echo ""
          echo "=== Pods ==="
          kubectl -n dashboards get pods -o wide
          echo ""
          echo "=== Pod Events (describe) ==="
          kubectl -n dashboards describe pods 2>&1 | tail -40
          echo ""
          echo "=== Deployment Events ==="
          kubectl -n dashboards describe deployment dashboards 2>&1 | tail -20
          echo ""
          echo "=== Events ==="
          kubectl -n dashboards get events --sort-by='.lastTimestamp' 2>&1 | tail -20
          echo ""
          echo "=== Testing URL ==="
          sleep 5
          curl -sI https://dashboards.sullylab.de 2>&1 | head -10 || echo "URL not yet reachable"
          echo ""
          echo "=== Check image availability ==="
          docker pull ghcr.io/ventureforgre/dashboards:main 2>&1 | tail -5 || echo "Image pull failed"
